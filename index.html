<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TriBhasha — Translate Seamlessly</title>

    <!-- Favicon fix to prevent 404 -->
    <link rel="icon" href="data:,">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 + ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3',
                            900: '#312e81', 950: '#1e1b4b'
                        },
                        secondary: {
                            50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff',
                            300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7',
                            600: '#9333ea', 700: '#7e22ce', 800: '#6b21a8',
                            900: '#581c87', 950: '#3b0764'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans Devanagari', 'system-ui', 'sans-serif'],
                        devanagari: ['Noto Sans Devanagari', 'sans-serif']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 1.5s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideDown: { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #4338ca; }

        /* Textarea resize handle */
        textarea { resize: none; }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass {
            background: rgba(30, 27, 75, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Animated gradient background */
        .gradient-bg {
            background: linear-gradient(-45deg, #e0e7ff, #f3e8ff, #eef2ff, #faf5ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        .dark .gradient-bg {
            background: linear-gradient(-45deg, #1e1b4b, #3b0764, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Pulse ring animation for translate button */
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: inherit;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            filter: blur(8px);
        }
        .pulse-ring:hover::before {
            opacity: 0.5;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Smooth transitions */
        * { transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }

        /* History item hover */
        .history-item:hover {
            transform: translateX(4px);
        }

        /* Focus ring */
        *:focus-visible {
            outline: 2px solid #818cf8;
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* Decorative blobs */
        .blob-1 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            pointer-events: none;
            z-index: 0;
        }
        .blob-2 {
            position: fixed;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -80px;
            left: -80px;
            pointer-events: none;
            z-index: 0;
        }
        .dark .blob-1 {
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
        }
        .dark .blob-2 {
            background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

        // ==================== CONSTANTS ====================
        /**
         * Safe Icon component for Lucide in React.
         * Prevents "removeChild" errors by managing the DOM lifecycle of the icon separately.
         */
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Clear and re-render icon to avoid React reconciliation conflicts
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({
                        targets: [iconRef.current.firstChild]
                    });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center pointer-events-none"></span>;
        };

        const LANGUAGES = [
            { code: 'en', name: 'English', nativeName: 'English', flag: '🇬🇧' },
            { code: 'hi', name: 'Hindi', nativeName: 'हिंदी', flag: '🇮🇳' },
            { code: 'mr', name: 'Marathi', nativeName: 'मराठी', flag: '🇮🇳' },
        ];

        const AUTO_DETECT = { code: 'auto', name: 'Auto Detect', nativeName: 'एक detect करा', flag: '🔍' };

        const MAX_CHARS = 5000;
        const HISTORY_KEY = 'tribhasha_history';
        const DARK_MODE_KEY = 'tribhasha_dark_mode';
        const MAX_HISTORY = 10;

        // ==================== CONTEXT ====================
        const ToastContext = createContext();

        // ==================== TRANSLATION SERVICE ====================
        const translateService = {
            async translateText(text, sourceLang, targetLang, detectedSourceLang = null) {
                if (!text || !text.trim()) {
                    throw new Error('Please enter text to translate.');
                }
                if (sourceLang === targetLang) {
                    throw new Error('Please select different languages.');
                }

                const sourceCode = sourceLang === 'auto' ? (detectedSourceLang || 'en') : sourceLang;

                try {
                    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceCode}|${targetLang}&mt=1&de=tribhasha@app.com`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('API request failed');
                    const data = await response.json();

                    if (data.responseStatus === 200 && data.responseData?.translatedText) {
                        let translated = data.responseData.translatedText;

                        // Filter out common "spam" results for single words (e.g., "mind" bug)
                        // If source is a single word but translation is a long sentence, find an MT match.
                        const matches = data.matches || [];
                        const sourceWordCount = text.trim().split(/\s+/).length;
                        const transWordCount = translated.trim().split(/\s+/).length;

                        if (sourceWordCount === 1 && transWordCount > 4) {
                            const mtMatch = matches.find(m => m['created-by'] && m['created-by'].includes('MT'));
                            if (mtMatch) translated = mtMatch.translation;
                        }

                        // MyMemory sometimes returns uppercase for short texts
                        if (translated === translated.toUpperCase() && translated.length < 50) {
                            translated = translated.charAt(0).toUpperCase() + translated.slice(1).toLowerCase();
                        }
                        return {
                            translatedText: translated,
                            sourceLanguage: sourceCode,
                            confidence: data.responseData.match || 0
                        };
                    }
                    throw new Error(data.responseDetails || 'Translation failed');
                } catch (err) {
                    throw new Error('Translation failed. Please try again later.');
                }
            },

            detectLanguage(text) {
                const devanagariRange = /[\u0900-\u097F]/;
                const hasDevanagari = devanagariRange.test(text);

                if (hasDevanagari) {
                    // Enhanced heuristic for distinguishing Hindi and Marathi
                    
                    // 1. Check for characters unique to Marathi
                    const marathiSpecific = /[ळऱ]/; 
                    if (marathiSpecific.test(text)) return 'mr';

                    // 2. Word-based scoring
                    const wordCheck = text.split(/\s+/);
                    let hindiScore = 0;
                    let marathiScore = 0;

                    // Distinctive function words
                    const hindiWords = ['है', 'हैं', 'में', 'का', 'की', 'के', 'को', 'से', 'और', 'नहीं', 'था', 'थे', 'लिए'];
                    const marathiWords = ['आहे', 'आहेत', 'मध्ये', 'चा', 'ची', 'चे', 'ला', 'ने', 'होता', 'होती', 'आणि', 'पण'];

                    wordCheck.forEach(word => {
                        if (hindiWords.includes(word)) hindiScore++;
                        if (marathiWords.includes(word)) marathiScore++;
                    });

                    // 3. Check for Hindi-specific nukta (e.g. in ज़, फ़)
                    if (text.includes('\u093C')) hindiScore++;

                    if (marathiScore > hindiScore) return 'mr';
                    if (hindiScore > marathiScore) return 'hi';
                    
                    // Default to hindi if scores are tied
                    return 'hi';
                }
                return 'en';
            }
        };

        // ==================== LOCAL STORAGE UTILS ====================
        const storage = {
            getHistory() {
                try {
                    const data = localStorage.getItem(HISTORY_KEY);
                    return data ? JSON.parse(data) : [];
                } catch { return []; }
            },
            saveHistory(history) {
                try {
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
                } catch (e) { console.warn('Could not save history', e); }
            },
            addToHistory(entry) {
                const history = this.getHistory();
                const exists = history.findIndex(h =>
                    h.sourceText === entry.sourceText &&
                    h.sourceLang === entry.sourceLang &&
                    h.targetLang === entry.targetLang
                );
                if (exists > -1) history.splice(exists, 1);
                history.unshift({
                    ...entry,
                    timestamp: Date.now(),
                    id: Date.now() + Math.random()
                });
                this.saveHistory(history);
                return history;
            },
            deleteFromHistory(id) {
                const history = this.getHistory().filter(h => h.id !== id);
                this.saveHistory(history);
                return history;
            },
            clearHistory() {
                localStorage.removeItem(HISTORY_KEY);
                return [];
            },
            getDarkMode() {
                try {
                    const val = localStorage.getItem(DARK_MODE_KEY);
                    return val ? JSON.parse(val) : window.matchMedia('(prefers-color-scheme: dark)').matches;
                } catch { return false; }
            },
            saveDarkMode(isDark) {
                try { localStorage.setItem(DARK_MODE_KEY, JSON.stringify(isDark)); } catch {}
            }
        };

        // ==================== TOAST PROVIDER ====================
        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);

            const addToast = useCallback((message, type = 'success', duration = 3000) => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, duration);
            }, []);

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none">
                        {toasts.map(toast => (
                            <Toast key={toast.id} message={toast.message} type={toast.type} />
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        }

        // ==================== TOAST COMPONENT ====================
        function Toast({ message, type }) {
            const bgColor = type === 'success' ? 'bg-green-500' :
                           type === 'error' ? 'bg-red-500' :
                           type === 'info' ? 'bg-primary-500' :
                           'bg-yellow-500';

            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'info' ? 'ℹ' : '⚠';

            return (
                <div className={`animate-slide-up pointer-events-auto ${bgColor} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 min-w-[280px] max-w-[400px]`}>
                    <span className="text-lg font-bold flex-shrink-0 w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-sm">
                        {icon}
                    </span>
                    <span className="text-sm font-medium">{message}</span>
                </div>
            );
        }

        // ==================== HEADER COMPONENT ====================
        function Header({ darkMode, toggleDarkMode }) {
            return (
                <header className="relative z-10 w-full">
                    <div className="max-w-5xl mx-auto px-4 sm:px-6 pt-6 pb-4">
                        <div className="flex items-center justify-between">
                            {/* Logo and Title */}
                            <div className="flex items-center gap-3 sm:gap-4">
                                <div className="relative">
                                    <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center shadow-lg shadow-primary-500/25 rotate-3 hover:rotate-0 transition-transform duration-300">
                                        <span className="text-white text-xl sm:text-2xl font-bold">त्र</span>
                                    </div>
                                    <div className="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full border-2 border-white dark:border-gray-900 animate-pulse-slow"></div>
                                </div>
                                <div>
                                    <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight">
                                        <span className="gradient-text">Tri</span>
                                        <span className="text-gray-800 dark:text-gray-100">Bhasha</span>
                                    </h1>
                                    <p className="text-xs sm:text-sm text-gray-500 dark:text-gray-400 font-medium tracking-wide">
                                        English • हिंदी • मराठी
                                    </p>
                                </div>
                            </div>

                            {/* Right Side Actions */}
                            <div className="flex items-center gap-2 sm:gap-3">
                                <button
                                    onClick={toggleDarkMode}
                                    className="p-2.5 rounded-xl bg-white/60 dark:bg-white/10 hover:bg-white dark:hover:bg-white/20 text-gray-600 dark:text-gray-300 shadow-sm hover:shadow-md transition-all duration-200"
                                    title={darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
                                >
                                    <Icon name={darkMode ? 'sun' : 'moon'} className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // ==================== LANGUAGE SELECTOR ====================
        function LanguageSelector({ label, selectedLang, onChange, excludeLang, includeAutoDetect }) {
            const options = includeAutoDetect
                ? [AUTO_DETECT, ...LANGUAGES]
                : LANGUAGES.filter(l => l.code !== excludeLang);

            return (
                <div className="flex-1 min-w-[140px]">
                    <label className="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1.5">
                        {label}
                    </label>
                    <div className="relative">
                        <select
                            value={selectedLang}
                            onChange={(e) => onChange(e.target.value)}
                            className="w-full appearance-none bg-white dark:bg-gray-800/80 border-2 border-gray-200 dark:border-gray-600/60 rounded-xl px-4 py-3 pr-10 text-sm font-semibold text-gray-800 dark:text-gray-100 focus:border-primary-400 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-100 dark:focus:ring-primary-900/30 transition-all duration-200 cursor-pointer hover:border-primary-300 dark:hover:border-primary-500/50"
                        >
                            {options.map(lang => (
                                <option key={lang.code} value={lang.code}>
                                    {lang.flag} {lang.name} {lang.code !== 'auto' ? `(${lang.nativeName})` : ''}
                                </option>
                            ))}
                        </select>
                        <div className="absolute inset-y-0 right-3 flex items-center pointer-events-none">
                            <Icon name="chevron-down" className="w-4 h-4 text-gray-400" />
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== LOADING SPINNER ====================
        function LoadingSpinner() {
            return (
                <div className="flex items-center justify-center gap-3 py-10">
                    <div className="relative">
                        <div className="w-10 h-10 rounded-full border-3 border-primary-200 dark:border-primary-800"></div>
                        <div className="absolute inset-0 w-10 h-10 rounded-full border-3 border-transparent border-t-primary-500 dark:border-t-primary-400 animate-spin"></div>
                    </div>
                    <span className="text-sm font-semibold text-primary-600 dark:text-primary-400 animate-pulse-slow">
                        Translating...
                    </span>
                </div>
            );
        }

        // ==================== TRANSLATOR CARD ====================
        function TranslatorCard({ 
            sourceLang, setSourceLang, 
            targetLang, setTargetLang, 
            sourceText, setSourceText, 
            translatedText, setTranslatedText 
        }) {
            const { addToast } = useContext(ToastContext);
            const [isTranslating, setIsTranslating] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);

            const sourceRef = useRef(null);
            const targetRef = useRef(null);
            const recognitionRef = useRef(null);

            const charCount = sourceText.length;
            const isSwapDisabled = sourceLang === 'auto';

            // Swap languages
            const handleSwap = useCallback(() => {
                if (sourceLang === 'auto') return;
                setSourceLang(targetLang);
                setTargetLang(sourceLang);
                setSourceText(translatedText);
                setTranslatedText(sourceText);
                addToast('Languages swapped', 'info');
            }, [sourceLang, targetLang, sourceText, translatedText, addToast]);

            // Translate
            const handleTranslate = useCallback(async () => {
                if (!sourceText.trim()) {
                    addToast('Please enter text to translate.', 'error');
                    sourceRef.current?.focus();
                    return;
                }
                if (sourceLang !== 'auto' && sourceLang === targetLang) {
                    addToast('Please select different languages.', 'error');
                    return;
                }

                setIsTranslating(true);
                setTranslatedText('');

                try {
                    const detectedLang = sourceLang === 'auto'
                        ? translateService.detectLanguage(sourceText)
                        : sourceLang;

                    if (detectedLang === targetLang) {
                        addToast('Source and target languages are the same. Please select different languages.', 'error');
                        setIsTranslating(false);
                        return;
                    }

                    const result = await translateService.translateText(sourceText, sourceLang, targetLang, detectedLang);
                    setTranslatedText(result.translatedText);

                    // Save to history
                    storage.addToHistory({
                        sourceText: sourceText.trim(),
                        translatedText: result.translatedText,
                        sourceLang: sourceLang === 'auto' ? detectedLang : sourceLang,
                        targetLang: targetLang
                    });

                    addToast('Translation successful!', 'success');
                } catch (error) {
                    addToast(error.message || 'Translation failed. Please try again.', 'error');
                } finally {
                    setIsTranslating(false);
                }
            }, [sourceText, sourceLang, targetLang, addToast]);

            // Copy to clipboard
            const handleCopy = useCallback(async (text) => {
                if (!text) return;
                try {
                    await navigator.clipboard.writeText(text);
                    addToast('Text copied to clipboard!', 'success');
                } catch {
                    // Fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    addToast('Text copied to clipboard!', 'success');
                }
            }, [addToast]);

            // Clear
            const handleClear = useCallback(() => {
                setSourceText('');
                setTranslatedText('');
                sourceRef.current?.focus();
                addToast('Text cleared.', 'info');
            }, [addToast]);

            // Download as TXT
            const handleDownload = useCallback(() => {
                if (!translatedText) return;
                const content = `TriBhasha Translation\n${'='.repeat(40)}\n\nSource Language: ${LANGUAGES.find(l => l.code === sourceLang)?.name || sourceLang}\nTarget Language: ${LANGUAGES.find(l => l.code === targetLang)?.name || targetLang}\n\nSource Text:\n${sourceText}\n\nTranslated Text:\n${translatedText}\n\n${'='.repeat(40)}\nTranslated with TriBhasha`;

                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `tribhasha-translation-${Date.now()}.txt`;
                a.click();
                URL.revokeObjectURL(url);
                addToast('Translation downloaded!', 'success');
            }, [sourceText, translatedText, sourceLang, targetLang, addToast]);

            // Voice Input
            const handleVoiceInput = useCallback(() => {
                if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                    addToast('Voice input is not supported in this browser.', 'error');
                    return;
                }

                if (isListening) {
                    recognitionRef.current?.stop();
                    setIsListening(false);
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();

                const langMap = { en: 'en-US', hi: 'hi-IN', mr: 'mr-IN', auto: '' };
                const langCode = sourceLang === 'auto' ? '' : langMap[sourceLang] || 'en-US';

                if (langCode) recognition.lang = langCode;
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => setIsListening(true);

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    setSourceText(prev => prev ? prev + ' ' + transcript : transcript);
                    addToast('Voice input captured!', 'success');
                };

                recognition.onerror = (event) => {
                    console.error('Speech recognition error', event.error);
                    addToast('Voice input failed. Please try again.', 'error');
                    setIsListening(false);
                };

                recognition.onend = () => setIsListening(false);

                recognitionRef.current = recognition;
                recognition.start();
            }, [sourceLang, isListening, addToast]);

            // Text-to-Speech
            const handleSpeak = useCallback((text, lang) => {
                if (!text) return;
                if (isSpeaking) {
                    window.speechSynthesis.cancel();
                    setIsSpeaking(false);
                    return;
                }

                const langMap = { en: 'en-US', hi: 'hi-IN', mr: 'mr-IN' };
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = langMap[lang] || 'en-US';
                utterance.rate = 0.9;

                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                utterance.onerror = () => setIsSpeaking(false);

                window.speechSynthesis.speak(utterance);
            }, [isSpeaking]);

            // Keyboard shortcut
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        e.preventDefault();
                        handleTranslate();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleTranslate]);

            return (
                <div className="animate-fade-in">
                    <div className="glass rounded-3xl shadow-xl dark:shadow-none border border-white/50 dark:border-white/10 overflow-hidden">

                        {/* Language Selectors Row */}
                        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-4 p-5 sm:p-6 border-b border-gray-100 dark:border-gray-700/50 bg-white/40 dark:bg-gray-800/40">
                            <LanguageSelector
                                label="From"
                                selectedLang={sourceLang}
                                onChange={setSourceLang}
                                includeAutoDetect={true}
                            />

                            {/* Swap Button */}
                            <div className="flex items-center self-end sm:self-center pt-5 sm:pt-0">
                                <button
                                    onClick={handleSwap}
                                    disabled={isSwapDisabled}
                                    className={`p-3 rounded-xl transition-all duration-300 group ${
                                        isSwapDisabled
                                            ? 'opacity-30 cursor-not-allowed bg-gray-100 dark:bg-gray-700 text-gray-400'
                                            : 'bg-gradient-to-r from-primary-500 to-secondary-500 text-white hover:shadow-lg hover:shadow-primary-500/25 hover:scale-110 active:scale-95'
                                    }`}
                                    title="Swap languages"
                                >
                                    <Icon name="arrow-left-right" className="w-5 h-5" />
                                </button>
                            </div>

                            <LanguageSelector
                                label="To"
                                selectedLang={targetLang}
                                onChange={setTargetLang}
                                excludeLang={sourceLang}
                            />
                        </div>

                        {/* Text Areas */}
                        <div className="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-gray-100 dark:divide-gray-700/50">

                            {/* Source Text Area */}
                            <div className="p-5 sm:p-6 relative group">
                                <textarea
                                    ref={sourceRef}
                                    value={sourceText}
                                    onChange={(e) => setSourceText(e.target.value)}
                                    placeholder="Enter text to translate..."
                                    maxLength={MAX_CHARS}
                                    className="w-full h-44 sm:h-52 bg-transparent text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 text-base sm:text-lg leading-relaxed focus:outline-none resize-none font-devanagari"
                                    aria-label="Source text"
                                />

                                {/* Source Action Buttons */}
                                <div className="flex items-center justify-between mt-2">
                                    <span className={`text-xs font-medium ${charCount > MAX_CHARS * 0.9 ? 'text-red-500' : 'text-gray-400 dark:text-gray-500'}`}>
                                        Characters: {charCount.toLocaleString()}
                                    </span>
                                    <div className="flex items-center gap-1">
                                        {/* Voice Input */}
                                        <button
                                            onClick={handleVoiceInput}
                                            className={`p-2 rounded-lg transition-all duration-200 ${
                                                isListening
                                                    ? 'bg-red-100 dark:bg-red-900/30 text-red-500 animate-pulse-slow'
                                                    : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50'
                                            }`}
                                            title={isListening ? 'Stop listening' : 'Voice input'}
                                        >
                                            <Icon name={isListening ? 'mic-off' : 'mic'} className="w-4 h-4" />
                                        </button>

                                        {/* Speak Source */}
                                        <button
                                            onClick={() => handleSpeak(sourceText, sourceLang === 'auto' ? translateService.detectLanguage(sourceText) : sourceLang)}
                                            className="p-2 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all duration-200"
                                            title="Listen to source text"
                                        >
                                            <Icon name="volume-2" className="w-4 h-4" />
                                        </button>

                                        {/* Clear */}
                                        <button
                                            onClick={handleClear}
                                            disabled={!sourceText && !translatedText}
                                            className="p-2 rounded-lg text-gray-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all duration-200 disabled:opacity-30 disabled:hover:text-gray-400 disabled:hover:bg-transparent"
                                            title="Clear text"
                                        >
                                            <Icon name="x" className="w-4 h-4" />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Translated Text Area */}
                            <div className="p-5 sm:p-6 relative bg-gray-50/50 dark:bg-gray-800/20">
                                {isTranslating ? (
                                    <LoadingSpinner />
                                ) : translatedText ? (
                                    <div className="animate-fade-in">
                                        <div className="w-full h-44 sm:h-52 text-gray-800 dark:text-gray-100 text-base sm:text-lg leading-relaxed font-devanagari overflow-y-auto pr-2">
                                            {translatedText}
                                        </div>
                                        <div className="flex items-center justify-between mt-2">
                                            <span className="text-xs font-medium text-primary-500 dark:text-primary-400">
                                                ✓ Translated
                                            </span>
                                            <div className="flex items-center gap-1">
                                                {/* Speak Result */}
                                                <button
                                                    onClick={() => handleSpeak(translatedText, targetLang)}
                                                    className={`p-2 rounded-lg transition-all duration-200 ${
                                                        isSpeaking
                                                            ? 'bg-primary-100 dark:bg-primary-900/30 text-primary-500'
                                                            : 'text-gray-400 hover:text-primary-500 dark:hover:text-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20'
                                                    }`}
                                                    title="Listen to translation"
                                                >
                                                    <Icon name="volume-2" className="w-4 h-4" />
                                                </button>

                                                {/* Copy */}
                                                <button
                                                    onClick={() => handleCopy(translatedText)}
                                                    className="p-2 rounded-lg text-gray-400 hover:text-green-500 dark:hover:text-green-400 hover:bg-green-50 dark:hover:bg-green-900/20 transition-all duration-200"
                                                    title="Copy translation"
                                                >
                                                    <Icon name="copy" className="w-4 h-4" />
                                                </button>

                                                {/* Download */}
                                                <button
                                                    onClick={handleDownload}
                                                    className="p-2 rounded-lg text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all duration-200"
                                                    title="Download as TXT"
                                                >
                                                    <Icon name="download" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="w-full h-44 sm:h-52 text-gray-300 dark:text-gray-600 text-base sm:text-lg leading-relaxed italic">
                                            Translation will appear here...
                                        </div>
                                        <div className="flex items-center justify-between mt-2">
                                            <span className="text-xs font-medium text-gray-300 dark:text-gray-600">Waiting for translation</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Translate Button */}
                        <div className="p-5 sm:p-6 bg-white/40 dark:bg-gray-800/40 border-t border-gray-100 dark:border-gray-700/50">
                            <button
                                onClick={handleTranslate}
                                disabled={isTranslating}
                                className="pulse-ring relative w-full py-4 px-8 rounded-2xl bg-gradient-to-r from-primary-500 via-primary-600 to-secondary-500 hover:from-primary-600 hover:via-primary-700 hover:to-secondary-600 text-white font-bold text-base sm:text-lg shadow-lg shadow-primary-500/25 hover:shadow-xl hover:shadow-primary-500/30 transition-all duration-300 disabled:opacity-70 disabled:cursor-not-allowed active:scale-[0.98] flex items-center justify-center gap-3"
                            >
                                {isTranslating ? (
                                    <>
                                        <div className="w-5 h-5 rounded-full border-2 border-white/30 border-t-white animate-spin"></div>
                                        <span>Translating...</span>
                                    </>
                                ) : (
                                    <>
                                        <Icon name="languages" className="w-5 h-5" />
                                        <span>Translate</span>
                                        <span className="hidden sm:inline text-white/50 text-sm font-normal ml-1">
                                            (Ctrl + Enter)
                                        </span>
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== HISTORY COMPONENT ====================
        function TranslationHistory({ onUseTranslation }) {
            const [history, setHistory] = useState(storage.getHistory());
            const [isExpanded, setIsExpanded] = useState(true);

            const refreshHistory = useCallback(() => {
                setHistory(storage.getHistory());
            }, []);

            // Listen for storage changes
            useEffect(() => {
                const interval = setInterval(refreshHistory, 1000);
                return () => clearInterval(interval);
            }, [refreshHistory]);

            const handleDelete = useCallback((id) => {
                const updated = storage.deleteFromHistory(id);
                setHistory(updated);
            }, []);

            const handleClearAll = useCallback(() => {
                storage.clearHistory();
                setHistory([]);
            }, []);

            const formatTime = (timestamp) => {
                const date = new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
                return date.toLocaleDateString();
            };

            const getLangName = (code) => {
                const lang = LANGUAGES.find(l => l.code === code);
                return lang ? `${lang.flag} ${lang.name}` : code;
            };

            if (history.length === 0) return null;

            return (
                <div className="animate-fade-in mt-8">
                    <div className="glass rounded-3xl shadow-xl dark:shadow-none border border-white/50 dark:border-white/10 overflow-hidden">
                        {/* History Header */}
                        <div
                            className="flex items-center justify-between p-5 sm:p-6 cursor-pointer hover:bg-white/30 dark:hover:bg-gray-800/30 transition-colors"
                            onClick={() => setIsExpanded(!isExpanded)}
                        >
                            <div className="flex items-center gap-3">
                                <div className="p-2 rounded-xl bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400">
                                    <Icon name="history" className="w-5 h-5" />
                                </div>
                                <div>
                                    <h3 className="font-bold text-gray-800 dark:text-gray-100">
                                        Recent Translations
                                    </h3>
                                    <p className="text-xs text-gray-500 dark:text-gray-400">
                                        {history.length} translation{history.length !== 1 ? 's' : ''} stored locally
                                    </p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {history.length > 0 && (
                                    <button
                                        onClick={(e) => { e.stopPropagation(); handleClearAll(); }}
                                        className="text-xs text-red-400 hover:text-red-500 dark:hover:text-red-300 font-medium px-3 py-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all"
                                    >
                                        Clear All
                                    </button>
                                )}
                                <div className={`transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>
                                    <Icon name="chevron-down" className="w-5 h-5 text-gray-400" />
                                </div>
                            </div>
                        </div>

                        {/* History List */}
                        {isExpanded && (
                            <div className="border-t border-gray-100 dark:border-gray-700/50 max-h-[500px] overflow-y-auto">
                                {history.map((entry, index) => (
                                    <div
                                        key={entry.id}
                                        className="history-item flex items-start gap-4 p-4 sm:p-5 border-b border-gray-50 dark:border-gray-700/30 last:border-0 hover:bg-white/30 dark:hover:bg-gray-800/30 transition-all duration-200 group"
                                    >
                                        {/* Language Badge */}
                                        <div className="flex-shrink-0 pt-0.5">
                                            <div className="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 text-xs font-semibold">
                                                {getLangName(entry.sourceLang)}
                                                <Icon name="arrow-right" className="w-3 h-3" />
                                                {getLangName(entry.targetLang)}
                                            </div>
                                        </div>

                                        {/* Text */}
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm text-gray-700 dark:text-gray-300 truncate">
                                                {entry.sourceText}
                                            </p>
                                            <p className="text-sm text-primary-600 dark:text-primary-400 font-medium truncate mt-0.5">
                                                {entry.translatedText}
                                            </p>
                                            <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">
                                                {formatTime(entry.timestamp)}
                                            </p>
                                        </div>

                                        {/* Actions */}
                                        <div className="flex-shrink-0 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button
                                                onClick={() => onUseTranslation(entry)}
                                                className="p-1.5 rounded-lg text-gray-400 hover:text-primary-500 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all"
                                                title="Use this translation"
                                            >
                                                <Icon name="repeat" className="w-4 h-4" />
                                            </button>
                                            <button
                                                onClick={() => handleDelete(entry.id)}
                                                className="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all"
                                                title="Delete"
                                            >
                                                <Icon name="trash-2" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==================== FOOTER COMPONENT ====================
        function Footer() {
            return (
                <footer className="relative z-10 mt-12 pb-8">
                    <div className="max-w-5xl mx-auto px-4 sm:px-6">
                        <div className="text-center">
                            <div className="flex items-center justify-center gap-2 mb-2">
                                <div className="w-6 h-6 rounded-lg bg-gradient-to-br from-primary-500 to-secondary-500 flex items-center justify-center">
                                    <span className="text-white text-xs font-bold">त्र</span>
                                </div>
                                <span className="text-sm font-bold gradient-text">TriBhasha</span>
                            </div>
                            <p className="text-xs text-gray-400 dark:text-gray-500">
                                Translate seamlessly between English, Hindi, and Marathi.
                            </p>
                            <p className="text-xs text-gray-300 dark:text-gray-600 mt-1">
                                Powered by MyMemory Translation API • {new Date().getFullYear()}
                            </p>
                        </div>
                    </div>
                </footer>
            );
        }

        // ==================== APP COMPONENT ====================
        function App() {
            const [darkMode, setDarkMode] = useState(storage.getDarkMode);
            const [sourceLang, setSourceLang] = useState('en');
            const [targetLang, setTargetLang] = useState('hi');
            const [sourceText, setSourceText] = useState('');
            const [translatedText, setTranslatedText] = useState('');

            // Apply dark mode
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                storage.saveDarkMode(darkMode);
            }, [darkMode]);

            const toggleDarkMode = useCallback(() => {
                setDarkMode(prev => !prev);
            }, []);

            const handleUseTranslation = useCallback((entry) => {
                setSourceLang(entry.sourceLang);
                setTargetLang(entry.targetLang);
                setSourceText(entry.sourceText);
                setTranslatedText(entry.translatedText);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, []);

            return (
                <ToastProvider>
                    <div className="min-h-screen gradient-bg relative">
                        {/* Decorative Blobs */}
                        <div className="blob-1"></div>
                        <div className="blob-2"></div>

                        {/* Header */}
                        <Header darkMode={darkMode} toggleDarkMode={toggleDarkMode} />

                        {/* Main Content */}
                        <main className="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 pb-4">
                            <TranslatorCard
                                sourceLang={sourceLang}
                                targetLang={targetLang}
                                setSourceLang={setSourceLang}
                                setTargetLang={setTargetLang}
                                sourceText={sourceText}
                                setSourceText={setSourceText}
                                translatedText={translatedText}
                                setTranslatedText={setTranslatedText}
                            />
                            <TranslationHistory onUseTranslation={handleUseTranslation} />
                        </main>

                        <Footer />
                    </div>
                </ToastProvider>
            );
        }

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
